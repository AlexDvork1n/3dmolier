<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partnership Pitch · 3D Molier × Александр Дворкин</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F8F7F4;
    --surface: #FFFFFF;
    --surface2: #F1EFE8;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text-primary: #1A1916;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --blue-accent: #185FA5;
    --teal-bg: #E1F5EE;
    --teal-text: #085041;
    --teal-accent: #0F6E56;
    --amber-bg: #FAEEDA;
    --amber-text: #633806;
    --gray-bg: #F1EFE8;
    --gray-text: #444441;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  /* Header */
  .header {
    width: 100%;
    max-width: 820px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
  }
  .header-logo {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.04em;
  }
  .header-date {
    font-size: 12px;
    color: var(--text-tertiary);
  }

  /* Deck container */
  .deck {
    width: 100%;
    max-width: 820px;
    background: var(--surface);
    border-radius: var(--radius-xl);
    border: 0.5px solid var(--border-strong);
    overflow: hidden;
  }

  /* Navigation */
  .nav-bar {
    display: flex;
    gap: 0;
    border-bottom: 0.5px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface2);
  }
  .nav-bar::-webkit-scrollbar { display: none; }
  .nav-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 12px 18px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-tertiary);
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.03em;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:hover { color: var(--text-primary); background: var(--border); }
  .nav-btn.active { color: var(--text-primary); border-bottom-color: var(--text-primary); background: var(--surface); }

  /* Slide */
  .slide { display: none; padding: 2.5rem 2.75rem 2rem; min-height: 480px; }
  .slide.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* Typography */
  .overline {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 0.6rem;
  }
  .h1 { font-size: 34px; font-weight: 400; line-height: 1.15; color: var(--text-primary); margin-bottom: 0.75rem; }
  .h2 { font-size: 22px; font-weight: 500; line-height: 1.25; color: var(--text-primary); margin-bottom: 0.75rem; }
  .sub { font-size: 15px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 1.75rem; max-width: 580px; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.3rem;
  }
  .card-surface {
    background: var(--surface2);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.3rem;
  }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .card-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.25rem; }

  /* Metric */
  .metric {
    background: var(--surface2);
    border-radius: var(--radius-md);
    padding: 1rem 1.1rem;
  }
  .metric .val { font-size: 26px; font-weight: 500; color: var(--text-primary); }
  .metric .mlab { font-size: 12px; color: var(--text-secondary); margin-top: 3px; line-height: 1.4; }

  /* Row items */
  .row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 1rem; }
  .row:last-child { margin-bottom: 0; }
  .icon-box {
    width: 36px; height: 36px;
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 17px; font-weight: 600;
  }
  .ib-blue { background: var(--blue-bg); color: var(--blue-accent); }
  .ib-teal { background: var(--teal-bg); color: var(--teal-accent); }
  .ib-amber { background: var(--amber-bg); color: var(--amber-text); }
  .ib-gray { background: var(--surface2); color: var(--text-secondary); }
  .rtitle { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
  .rdesc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

  /* Tags / Badges */
  .tag { display: inline-block; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: var(--radius-md); margin: 2px 4px 2px 0; }
  .tag-blue { background: var(--blue-bg); color: var(--blue-text); }
  .tag-teal { background: var(--teal-bg); color: var(--teal-text); }
  .tag-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; padding: 3px 10px; border-radius: var(--radius-md); margin-bottom: 8px; }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
  .badge-teal { background: var(--teal-bg); color: var(--teal-text); }

  /* Divider */
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }

  /* Left border accent */
  .pl { padding-left: 1rem; border-left: 2px solid var(--border); margin-bottom: 10px; }
  .pl-blue { border-left-color: var(--blue-accent); }
  .pl-teal { border-left-color: var(--teal-accent); }

  /* Featured card */
  .featured { border: 2px solid var(--blue-accent); }

  /* Footer nav */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 2.75rem;
    border-top: 0.5px solid var(--border);
    background: var(--surface2);
  }
  .fn-btn {
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-md);
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .fn-btn:hover { background: var(--surface2); }
  .fn-btn:disabled { opacity: 0.35; cursor: default; }
  .fn-counter { font-size: 12px; color: var(--text-tertiary); }

  /* Progress bar */
  .progress-bar {
    height: 2px;
    background: var(--border);
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--text-primary);
    transition: width 0.25s ease;
  }

  /* Contact block */
  .contact-row {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface2);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.3rem;
  }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--blue-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600; color: var(--blue-accent);
    flex-shrink: 0;
  }

  /* SVG icons inline */
  .icon { width: 18px; height: 18px; vertical-align: -3px; }

  @media (max-width: 600px) {
    .slide { padding: 1.5rem 1.25rem 1.25rem; }
    .footer { padding: 1rem 1.25rem; }
    .h1 { font-size: 26px; }
    .card-grid, .card-grid-3, .split { grid-template-columns: 1fr; }
  }
</style>
</head>

let current = 0;
const totalSlides = slides.length;

function render() {
  const nav = document.getElementById('nav');
  const slidesEl = document.getElementById('slides');
  const counter = document.getElementById('counter');
  const progress = document.getElementById('progress');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');

  nav.innerHTML = slides.map((s, i) =>
    `<button class="nav-btn${i === current ? ' active' : ''}" onclick="goTo(${i})">${s.label}</button>`
  ).join('');

  slidesEl.innerHTML = slides.map((s, i) =>
    `<div class="slide${i === current ? ' active' : ''}">${s.html}</div>`
  ).join('');

  counter.textContent = `${current + 1} / ${totalSlides}`;
  progress.style.width = `${((current + 1) / totalSlides) * 100}%`;
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === totalSlides - 1;
}

function goTo(i) { current = i; render(); }
function nextSlide() { if (current < totalSlides - 1) { current++; render(); } }
function prevSlide() { if (current > 0) { current--; render(); } }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
});

render();
</script>
